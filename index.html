<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>格致问题捕手 · Question Catcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  /* ========================================================
     1 · BRAND COLORS
     ======================================================== */
  --brand-abyss:      #050B1F;   /* deepest background       */
  --brand-deep:       #0A1A3F;   /* primary background blue  */
  --brand-ocean:      #12305E;   /* mid background blue      */
  --brand-tide:       #1E4D8C;   /* raised surfaces          */

  --brand-cyan:       #38BDF8;   /* primary accent (electric)*/
  --brand-cyan-hi:    #7DD8FB;   /* hover / lighter accent   */
  --brand-azure:      #3B82F6;   /* secondary accent / links */
  --brand-glow:       #22D3EE;   /* glow / focus halo        */

  /* ========================================================
     2 · GRADIENTS & BACKDROPS
     ======================================================== */
  --bg-immersive:
     radial-gradient(120% 90% at 15% -10%, #173a72 0%, transparent 55%),
     radial-gradient(110% 80% at 95% 110%, #0c3a66 0%, transparent 50%),
     linear-gradient(168deg, #0A1A3F 0%, #07132E 55%, #050B1F 100%);
  --bg-accent-bloom:
     radial-gradient(60% 60% at 50% 0%, rgba(56,189,248,0.22) 0%, transparent 70%);
  --accent-grad:    linear-gradient(135deg, #38BDF8 0%, #3B82F6 100%); /* @kind color */
  --accent-grad-soft: linear-gradient(135deg, rgba(56,189,248,0.18) 0%, rgba(59,130,246,0.10) 100%); /* @kind color */

  /* ========================================================
     3 · GLASS SURFACES  (use WITH backdrop-filter: blur)
     ======================================================== */
  --glass-fill:        rgba(255,255,255,0.07);   /* base panel        */
  --glass-fill-strong: rgba(255,255,255,0.12);   /* raised / hover    */
  --glass-fill-soft:   rgba(255,255,255,0.04);   /* subtle inset      */
  --glass-tint:        rgba(56,189,248,0.08);    /* accent-tinted glass*/
  --glass-border:      rgba(255,255,255,0.16);   /* hairline edge     */
  --glass-border-hi:   rgba(255,255,255,0.32);   /* lit top edge      */
  --glass-blur:        22px;                      /* backdrop blur     */
  --glass-blur-heavy:  40px;

  /* Specular highlight gradient laid over a glass panel's top edge */
  --glass-specular:
     linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 42%); /* @kind color */

  /* ========================================================
     4 · TEXT  (light on dark)
     ======================================================== */
  --fg1: #F4F8FF;                       /* primary text         */
  --fg2: rgba(226,238,255,0.72);        /* secondary text       */
  --fg3: rgba(198,217,247,0.52);        /* tertiary / captions  */
  --fg-muted: rgba(180,202,238,0.38);   /* disabled / hint      */
  --fg-accent: #7DD8FB;                 /* accent text / links  */
  --fg-on-accent: #061226;              /* text on cyan buttons */

  /* ========================================================
     5 · SEMANTIC / STATUS
     ======================================================== */
  --ok:    #34D399;
  --warn:  #FBBF24;
  --err:   #FB7185;
  --info:  var(--brand-cyan);

  /* ========================================================
     6 · RADII
     ======================================================== */
  --r-xs: 8px;
  --r-sm: 12px;
  --r-md: 18px;
  --r-lg: 26px;
  --r-xl: 34px;
  --r-pill: 999px;

  /* ========================================================
     7 · SHADOWS & GLOW
     ------------------------------------------------------
     Glass uses soft ambient drop shadows + an inner top
     highlight (inset) to read as a lit translucent slab.
     ======================================================== */
  --shadow-glass:
     0 1px 0 0 rgba(255,255,255,0.10) inset,
     0 8px 32px -8px rgba(3,10,28,0.55),
     0 2px 8px -4px rgba(3,10,28,0.40);
  --shadow-raised:
     0 1px 0 0 rgba(255,255,255,0.14) inset,
     0 18px 50px -12px rgba(2,8,24,0.70);
  --shadow-float:
     0 30px 80px -20px rgba(2,8,24,0.80),
     0 2px 0 0 rgba(255,255,255,0.10) inset;
  --glow-cyan:    0 0 0 1px rgba(56,189,248,0.40), 0 0 28px -2px rgba(56,189,248,0.55);
  --glow-focus:   0 0 0 3px rgba(56,189,248,0.30), 0 0 24px -4px rgba(34,211,238,0.50);

  /* ========================================================
     8 · SPACING SCALE  (4px base)
     ======================================================== */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 24px;
  --sp-6: 32px;
  --sp-7: 48px;
  --sp-8: 64px;
  --sp-9: 96px;

  /* ========================================================
     9 · TYPE FAMILIES
     ======================================================== */
  --font-display: 'Space Grotesk', 'Noto Sans SC', system-ui, sans-serif;
  --font-body:    'Noto Sans SC', 'Space Grotesk', system-ui, sans-serif;
  --font-mono:    'Space Mono', ui-monospace, 'SFMono-Regular', monospace;

  /* ========================================================
     10 · MOTION
     ======================================================== */
  --ease-glass: cubic-bezier(0.22, 1, 0.36, 1); /* @kind other */
  --ease-snap:  cubic-bezier(0.34, 1.56, 0.64, 1); /* @kind other */
  --dur-fast: 140ms; /* @kind other */
  --dur-base: 260ms; /* @kind other */
  --dur-slow: 520ms; /* @kind other */
}

/* ============================================================
   SEMANTIC TYPOGRAPHY
   Numerals + Latin run in Space Grotesk via the display stack;
   Chinese falls through to Noto Sans SC automatically.
   ============================================================ */
.display-1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(40px, 6vw, 72px);
  line-height: 1.04;
  letter-spacing: -0.02em;
  color: var(--fg1);
}
.display-2 {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: clamp(32px, 4.5vw, 52px);
  line-height: 1.08;
  letter-spacing: -0.015em;
  color: var(--fg1);
}
.h1 {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 34px;
  line-height: 1.15;
  letter-spacing: -0.01em;
  color: var(--fg1);
}
.h2 {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 26px;
  line-height: 1.2;
  color: var(--fg1);
}
.h3 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 20px;
  line-height: 1.3;
  color: var(--fg1);
}
.body-lg {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 18px;
  line-height: 1.6;
  color: var(--fg2);
}
.body {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 15px;
  line-height: 1.65;
  color: var(--fg2);
}
.caption {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 13px;
  line-height: 1.5;
  color: var(--fg3);
}
.overline {
  font-family: var(--font-mono);
  font-weight: 400;
  font-size: 12px;
  line-height: 1.4;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--fg-accent);
}
.label-mono {
  font-family: var(--font-mono);
  font-weight: 400;
  font-size: 12.5px;
  letter-spacing: 0.04em;
  color: var(--fg3);
}

/* ============================================================
   REUSABLE GLASS PRIMITIVE
   Apply .glass to any element to get the liquid-glass slab.
   ============================================================ */
.glass {
  position: relative;
  background: var(--glass-fill);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(140%);
  backdrop-filter: blur(var(--glass-blur)) saturate(140%);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-glass);
}
/* specular top-edge highlight */
.glass::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: var(--glass-specular);
  pointer-events: none;
  mix-blend-mode: screen;
  opacity: 0.7;
}
</style>
<style>
/* kit.css — layout & component styles for the Question Catcher UI kit.
   Tokens come from colors_and_type.css; this file is pure layout. */

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: var(--font-body);
  color: var(--fg1);
  background: var(--brand-deep);
  overflow-x: hidden;
}
#root { min-height: 100vh; }

/* ---------- Background ---------- */
.qc-bg {
  position: fixed; inset: 0; z-index: 0;
  overflow: hidden;
  /* Slowly flowing blue gradient. Brighter teal/cyan bands so the
     motion is actually visible, but a long loop keeps it calm. */
  background:
    linear-gradient(122deg, #04132e 0%, #0A1A3F 16%, #14457a 34%, #0d6a93 50%, #16487a 66%, #0A1A3F 84%, #04132e 100%);
  background-size: 360% 360%;
  background-position: 0% 50%;
  animation: qc-bg-flow 30s ease-in-out infinite;
}
@keyframes qc-bg-flow {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@media (prefers-reduced-motion: reduce) {
  .qc-bg { animation: none; }
}
.qc-bloom {
  position: absolute; border-radius: 50%;
  filter: blur(70px); opacity: 0.72;
  animation: qc-drift 26s var(--ease-glass) infinite alternate;
}
.qc-bloom-a { width: 560px; height: 560px; left: -8%; top: -14%;
  background: radial-gradient(circle, rgba(56,189,248,0.5), transparent 68%); }
.qc-bloom-b { width: 640px; height: 640px; right: -12%; bottom: -18%;
  background: radial-gradient(circle, rgba(59,130,246,0.46), transparent 68%); animation-delay: -9s; }
.qc-bloom-c { width: 460px; height: 460px; left: 42%; top: 26%;
  background: radial-gradient(circle, rgba(34,211,238,0.34), transparent 68%); animation-delay: -16s; }
@keyframes qc-drift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(160px,-110px) scale(1.3); }
}
.qc-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
  background-size: 56px 56px;
  mask-image: radial-gradient(120% 90% at 50% 25%, #000 0%, transparent 75%);
  -webkit-mask-image: radial-gradient(120% 90% at 50% 25%, #000 0%, transparent 75%);
}

/* ---------- App shell ---------- */
.qc-app { position: relative; z-index: 1; min-height: 100vh;
  display: flex; flex-direction: column; }

/* ---------- Header ---------- */
.qc-header {
  position: sticky; top: 16px; z-index: 5;
  margin: 16px 24px 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; border-radius: var(--r-pill);
}
.qc-brand { display: flex; align-items: center; gap: 12px; }
.qc-mark {
  width: 38px; height: 38px; display: grid; place-items: center;
  background: var(--glass-tint); border: 1px solid rgba(56,189,248,0.4);
  border-radius: 11px; box-shadow: var(--glow-cyan);
}
.qc-wordmark { font-family: var(--font-display); font-weight: 700; font-size: 20px;
  letter-spacing: -0.01em; }
.qc-wordmark .qc-accent { color: var(--brand-cyan); }
.qc-sub { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.18em;
  color: var(--fg3); margin-left: 4px; }
.qc-status { display: flex; align-items: center; gap: 8px; }
.qc-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ok);
  box-shadow: 0 0 10px var(--ok); animation: qc-pulse 2.4s ease-in-out infinite; }
@keyframes qc-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ---------- Hero / center stage ---------- */
.qc-stage {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 48px 24px 80px;
  transition: justify-content var(--dur-slow) var(--ease-glass);
}
.qc-stage.has-answer { justify-content: flex-start; padding-top: 40px; }
.qc-hero { width: 100%; max-width: 760px; text-align: center;
  animation: qc-rise var(--dur-slow) var(--ease-glass) both; }
.qc-eyebrow { display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 14px; border-radius: var(--r-pill);
  background: var(--glass-fill); border: 1px solid var(--glass-border);
  -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px);
  margin-bottom: 22px; }
.qc-eyebrow .label-mono { color: var(--fg-accent); }
.qc-title { font-family: var(--font-display); font-weight: 700;
  font-size: clamp(38px, 6vw, 62px); line-height: 1.06; letter-spacing: -0.02em;
  margin: 0 0 12px; }
.qc-title .qc-accent { color: var(--brand-cyan); }
.qc-tagline { font-size: 18px; color: var(--fg2); margin: 0 0 34px; }

/* ---------- Ask window ---------- */
.qc-ask {
  width: 100%; max-width: 760px; display: flex; align-items: center; gap: 14px;
  padding: 16px 16px 16px 22px; border-radius: var(--r-xl); cursor: text;
  transition: box-shadow var(--dur-base) var(--ease-glass),
              border-color var(--dur-base) var(--ease-glass),
              transform var(--dur-base) var(--ease-glass);
}
.qc-ask.is-focused { border-color: rgba(56,189,248,0.5); box-shadow: var(--glow-focus); }
.qc-ask-dot { width: 9px; height: 9px; border-radius: 50%; flex: none;
  background: var(--brand-cyan); box-shadow: 0 0 12px var(--brand-cyan); }
.qc-ask-input { flex: 1; background: transparent; border: none; outline: none;
  font-family: var(--font-body); font-size: 18px; color: var(--fg1); }
.qc-ask-input::placeholder { color: var(--fg-muted); }
.qc-ask-btn {
  flex: none; display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-body); font-size: 15px; font-weight: 600;
  color: var(--fg-on-accent); background: var(--accent-grad); border: none;
  padding: 12px 22px; border-radius: var(--r-pill); cursor: pointer;
  box-shadow: var(--glow-cyan); transition: transform var(--dur-fast) var(--ease-snap), filter var(--dur-fast); }
.qc-ask-btn:hover:not(:disabled) { filter: brightness(1.08); }
.qc-ask-btn:active:not(:disabled) { transform: scale(0.96); }
.qc-ask-btn:disabled { opacity: 0.45; cursor: default; box-shadow: none; }
.qc-ask-btn [data-lucide="loader"] { animation: qc-spin 0.9s linear infinite; }
@keyframes qc-spin { to { transform: rotate(360deg); } }

/* ---------- Preset chips (floating, tiered by depth) ---------- */
.qc-float { width: 100%; max-width: 860px; margin-top: 26px;
  display: flex; flex-direction: column; align-items: center; gap: 16px; }
.qc-presets-label { display: flex; align-items: center; gap: 7px;
  justify-content: center; }
.qc-float-rows { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
.qc-float-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
  transition: filter var(--dur-base) var(--ease-glass), opacity var(--dur-base) var(--ease-glass); }
/* depth: nearer the search box = sharp, farther = blurred & faded */
.qc-float-row[data-depth="0"] { filter: none; opacity: 1; }
.qc-float-row[data-depth="1"] { filter: blur(1.3px); opacity: 0.74; }
.qc-float-row[data-depth="2"] { filter: blur(3.4px); opacity: 0.5; }
.qc-float-row[data-depth="3"] { filter: blur(5.5px); opacity: 0.36; }
.qc-float-row:hover { filter: none; opacity: 1; }   /* hovering a row brings it into focus */

.qc-fwrap { display: inline-flex; animation: qc-emerge 0.95s var(--ease-glass) both; }
.qc-fbob  { display: inline-flex; animation: qc-bob 6.5s ease-in-out infinite; }
@keyframes qc-emerge { from { transform: translateY(40px); } to { transform: translateY(0); } }
@keyframes qc-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
@media (prefers-reduced-motion: reduce) {
  .qc-fwrap, .qc-fbob { animation: none; }
}

.qc-chip {
  font-family: var(--font-body); font-size: 14px; color: var(--fg2);
  background: var(--glass-fill); border: 1px solid var(--glass-border);
  -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px);
  padding: 10px 16px; border-radius: var(--r-pill); cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  transition: color var(--dur-fast) var(--ease-glass),
              background var(--dur-fast) var(--ease-glass),
              border-color var(--dur-fast) var(--ease-glass),
              transform var(--dur-fast) var(--ease-glass); }
.qc-chip:hover { color: var(--fg1); background: var(--glass-fill-strong);
  border-color: var(--glass-border-hi); transform: translateY(-2px); }
.qc-chip-accent { color: var(--fg-accent); background: var(--glass-tint);
  border-color: rgba(56,189,248,0.32); }
.qc-chip-accent:hover { box-shadow: var(--glow-cyan); color: var(--fg1); }

/* 换一批 button */
.qc-shuffle { margin-top: 4px; display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-body); font-size: 13.5px; font-weight: 500; color: var(--fg-accent);
  background: var(--glass-fill); border: 1px solid var(--glass-border);
  -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px);
  padding: 9px 18px; border-radius: var(--r-pill); cursor: pointer;
  transition: all var(--dur-fast) var(--ease-glass); }
.qc-shuffle:hover { color: var(--fg1); border-color: rgba(56,189,248,0.4);
  box-shadow: var(--glow-cyan); }
.qc-shuffle:active { transform: scale(0.97); }
.qc-shuffle:active [data-lucide="shuffle"] { transform: rotate(-20deg); }
.qc-shuffle [data-lucide="shuffle"] { transition: transform var(--dur-base) var(--ease-snap); }

/* ---------- Loading ---------- */
.qc-loading { width: 100%; max-width: 760px; margin-top: 28px;
  display: flex; align-items: center; gap: 14px; padding: 20px 24px;
  animation: qc-rise var(--dur-base) var(--ease-glass) both; }
.qc-loading .qc-bars { display: flex; gap: 5px; align-items: flex-end; height: 22px; }
.qc-loading .qc-bars span { width: 4px; border-radius: 2px; background: var(--brand-cyan);
  animation: qc-eq 1s ease-in-out infinite; }
.qc-loading .qc-bars span:nth-child(2){ animation-delay: .15s; }
.qc-loading .qc-bars span:nth-child(3){ animation-delay: .3s; }
.qc-loading .qc-bars span:nth-child(4){ animation-delay: .45s; }
@keyframes qc-eq { 0%,100%{ height: 7px; } 50%{ height: 22px; } }
.qc-loading-text { color: var(--fg2); font-size: 15px; }

/* ---------- Answer ---------- */
.qc-answer { width: 100%; max-width: 820px; margin-top: 30px; padding: 28px 30px 30px;
  animation: qc-rise var(--dur-slow) var(--ease-glass) both; }
.qc-ans-head { display: flex; align-items: flex-start; justify-content: space-between;
  gap: 16px; padding-bottom: 22px; border-bottom: 1px solid var(--glass-border); }
.qc-ans-q { display: flex; gap: 12px; align-items: flex-start; }
.qc-ans-qmark { width: 34px; height: 34px; flex: none; display: grid; place-items: center;
  background: var(--glass-tint); border: 1px solid rgba(56,189,248,0.4);
  border-radius: 10px; box-shadow: var(--glow-cyan); }
.qc-ans-tag { color: var(--fg-accent); margin-bottom: 5px; }
.qc-ans-question { font-family: var(--font-display); font-weight: 600; font-size: 24px;
  line-height: 1.25; margin: 0; letter-spacing: -0.01em; }
.qc-ghost-btn { flex: none; display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--font-body); font-size: 14px; font-weight: 500; color: var(--fg1);
  background: var(--glass-fill); border: 1px solid var(--glass-border-hi);
  padding: 10px 16px; border-radius: var(--r-pill); cursor: pointer;
  transition: all var(--dur-fast); }
.qc-ghost-btn:hover { background: var(--glass-fill-strong); }

.qc-block { display: flex; gap: 18px; padding-top: 24px;
  animation: qc-rise var(--dur-base) var(--ease-glass) both; }
.qc-block-rail { display: flex; flex-direction: column; align-items: center; flex: none; width: 28px; }
.qc-block-num { font-family: var(--font-mono); font-size: 13px; color: var(--brand-cyan); }
.qc-block-line { width: 1px; flex: 1; margin-top: 8px;
  background: linear-gradient(var(--glass-border-hi), transparent); }
.qc-block-body { flex: 1; padding-bottom: 4px; }
.qc-block-label { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.qc-summary { font-size: 18px; line-height: 1.6; color: var(--fg1); margin: 0; text-wrap: pretty; }
.qc-points { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 16px; }
.qc-points li { display: flex; gap: 14px; align-items: flex-start; }
.qc-point-key { flex: none; min-width: 52px; font-weight: 700; font-size: 14px;
  color: var(--fg-accent); font-family: var(--font-display); line-height: 1.6; }
.qc-point-val { color: var(--fg2); font-size: 15px; line-height: 1.55; }
.qc-detail { color: var(--fg2); font-size: 15px; line-height: 1.7; margin: 0; text-wrap: pretty; }
.qc-sources { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
.qc-source { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px;
  color: var(--fg3); font-family: var(--font-mono);
  background: var(--glass-fill-soft); border: 1px solid var(--glass-border);
  padding: 6px 12px; border-radius: var(--r-pill); }
.qc-followups { display: flex; flex-wrap: wrap; gap: 10px; }

/* transform-only entrance: content is always opacity:1 so it never

const QUESTION_POOL = Object.keys(ANSWERS);

/* Return `n` distinct random questions from the pool, avoiding the
   ones in `exclude` when possible (used by the 换一批 shuffle). */
function sampleQuestions(n, exclude = []) {
  const ex = new Set(exclude);
  let avail = QUESTION_POOL.filter((q) => !ex.has(q));
  if (avail.length < n) avail = QUESTION_POOL.slice(); // pool small → allow repeats of older set
  const shuffled = avail.slice();
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled.slice(0, n);
}

/* ============================================================
   外接摇杆 / 键盘 控制层
   - 4 个语义动作：prev / next / confirm / cancel
   - 各界面（待机屏、相机、识别面板…）按"层"注册自己的处理函数，
     最顶层的活动界面优先响应（弹窗自然覆盖底层）。
   - 同时支持两种对接方式：
       方式一（键盘/摇杆发按键）：←→ = prev/next，↓或回车 = confirm，↑或Esc = cancel
       方式二（页面提供 JS 接口）：window.QC.next()/prev()/confirm()/cancel()
   ============================================================ */
const __qcStack = [];
function qcPush(layer) {
  __qcStack.push(layer);
  return () => {
    const i = __qcStack.indexOf(layer);
    if (i >= 0) __qcStack.splice(i, 1);
  };
}
function qcFire(action) {
  for (let i = __qcStack.length - 1; i >= 0; i--) {
    const fn = __qcStack[i] && __qcStack[i][action];
    if (typeof fn === "function") { fn(); return true; }
  }
  return false;
}
/* 当 active 为真时，把这一层的处理函数注册到栈顶；始终调用最新的回调。 */
function useControlLayer(active, handlers) {
  const ref = useRef(handlers);
  ref.current = handlers;
  useEffect(() => {
    if (!active) return;
    const layer = {
      prev:    () => ref.current.prev    && ref.current.prev(),
      next:    () => ref.current.next    && ref.current.next(),
      confirm: () => ref.current.confirm && ref.current.confirm(),
      cancel:  () => ref.current.cancel  && ref.current.cancel(),
    };
    return qcPush(layer);
  }, [active]);
}

/* AskWindow.jsx — 询问输入栏（含语音 / 拍照输入接口）+ 预设问题浮层。 */

function AskWindow({ value, onChange, onSubmit, focused, onFocus, onBlur, busy }) {
  const inputRef = useRef(null);
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const [listening, setListening] = useState(false);
  const [camOpen, setCamOpen] = useState(false);
  const [recog, setRecog] = useState(null); // { source:"photo"|"voice", image, text }
  const [hint, setHint] = useState(null);
  useLucide();

  function flash(msg) {
    setHint(msg);
    window.clearTimeout(flash._t);
    flash._t = window.setTimeout(() => setHint(null), 2600);
  }
  function stopStream() {
    if (streamRef.current) {
      streamRef.current.getTracks().forEach((t) => t.stop());
      streamRef.current = null;
    }
  }
  // 卸载时确保关闭摄像头/麦克风
  useEffect(() => stopStream, []);
  // 摄像头画面就绪后挂到 video 上
  useEffect(() => {
    if (camOpen && videoRef.current && streamRef.current) {
      videoRef.current.srcObject = streamRef.current;
      videoRef.current.play().catch(() => {});
    }
  }, [camOpen]);

  async function openCamera(e) {
    e && e.stopPropagation();
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      flash("此浏览器不支持调用摄像头，请使用 Chrome");
      return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment", width: { ideal: 1280 } },
        audio: false,
      });
      streamRef.current = stream;
      setCamOpen(true);
    } catch (err) {
      flash("无法打开摄像头：请检查摄像头连接与权限");
    }
  }
  function closeCamera() { stopStream(); setCamOpen(false); }
  function snap() {
    const v = videoRef.current;
    if (!v) return;
    const w = v.videoWidth || 1280, h = v.videoHeight || 720;
    const canvas = document.createElement("canvas");
    canvas.width = w; canvas.height = h;
    canvas.getContext("2d").drawImage(v, 0, 0, w, h);
    const image = canvas.toDataURL("image/jpeg", 0.9);
    closeCamera();
    setRecog({ source: "photo", image, text: "" });
  }

  async function toggleVoice(e) {
    e.stopPropagation();
    if (listening) {
      setListening(false); stopStream();
      setRecog({ source: "voice", image: null, text: "" });
      return;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      flash("此浏览器不支持调用麦克风，请使用 Chrome");
      return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      streamRef.current = stream;
      setListening(true);
      flash("正在聆听…… 再次点击话筒结束");
    } catch (err) {
      flash("无法打开麦克风：请检查麦克风连接与权限");
    }
  }

  function confirmRecog() {
    const t = (recog.text || "").trim();
    if (!t) { flash("请先输入或确认识别到的文字"); return; }
    setRecog(null);
    onChange(t);
    onSubmit(t);
  }
  function retryRecog() {
    const s = recog.source;
    setRecog(null);
    if (s === "photo") openCamera();
    else toggleVoice({ stopPropagation() {} });
  }

  /* 相机取景中：下拨=确认拍照，上拨=取消退出。 */
  useControlLayer(camOpen, {
    confirm: () => snap(),
    cancel: () => closeCamera(),
  });
  /* 识别面板中：下拨=用这段文字去捕捉，上拨=丢弃。 */
  useControlLayer(!!recog && !camOpen, {
    confirm: () => confirmRecog(),
    cancel: () => setRecog(null),
  });

  return (
    <div className="qc-ask-wrap">
      <div
        className={"qc-ask glass" + (focused ? " is-focused" : "") + (listening ? " is-listening" : "")}
        onClick={() => inputRef.current && inputRef.current.focus()}
      >
        <span className="qc-ask-dot"></span>
        <input
          ref={inputRef}
          className="qc-ask-input"
          type="text"
          value={value}
          placeholder="输入你的问题，或从下方选择一个开始……"
          onChange={(e) => onChange(e.target.value)}
          onFocus={onFocus}
          onBlur={onBlur}
          onKeyDown={(e) => { if (e.key === "Enter" && value.trim()) onSubmit(); }}
          disabled={busy}
        />

        {/* 语音 / 拍照 输入接口 —— 键鼠输入栏的侧边 */}
        <div className="qc-input-tools">
          <button
            className={"qc-tool" + (listening ? " is-on" : "")}
            title="语音输入"
            aria-label="语音输入"
            onClick={toggleVoice}
          >
            <Icon name="mic" size={19} />
          </button>
          <button className="qc-tool" title="拍照提问" aria-label="拍照输入" onClick={openCamera}>
            <Icon name="camera" size={19} />
          </button>
        </div>

        <span className="qc-ask-sep"></span>

        <button
          className="qc-ask-btn"
          disabled={!value.trim() || busy}
          onClick={(e) => { e.stopPropagation(); if (value.trim()) onSubmit(); }}
        >
          {busy ? "捕捉中" : "捕捉"}
          <Icon name={busy ? "loader" : "arrow-right"} size={17} />
        </button>
      </div>

      {(hint || listening) && (
        <div className="qc-input-hint">
          {listening && <span className="qc-listen-wave"><span></span><span></span><span></span><span></span><span></span></span>}
          <span>{hint || "正在聆听……"}</span>
        </div>
      )}

      {/* 底部识别结果面板（拍照 / 语音录入后出现） */}
      {recog && (
        <div className="qc-recog glass">
          <div className="qc-recog-head">
            <span className="qc-recog-title">
              <Icon name={recog.source === "photo" ? "scan-text" : "mic"} size={16} color="var(--fg-accent)" />
              识别结果 · {recog.source === "photo" ? "拍照录入" : "语音录入"}
            </span>
            <button className="qc-recog-x" aria-label="关闭" onClick={() => setRecog(null)}>
              <Icon name="x" size={16} />
            </button>
          </div>
          <div className="qc-recog-body">
            {recog.image && <img className="qc-recog-thumb" src={recog.image} alt="拍摄的照片" />}
            <textarea
              className="qc-recog-box"
              rows={recog.image ? 4 : 3}
              value={recog.text}
              placeholder="识别引擎接入后，这里会自动填入识别到的文字；现在可以手动输入或修改……"
              onChange={(e) => setRecog({ ...recog, text: e.target.value })}
            />
          </div>
          <div className="qc-recog-foot">
            <span className="qc-recog-note">
              <Icon name="info" size={13} /> 文字识别（OCR / 语音转写）接入 AI 服务后自动完成
            </span>
            <div className="qc-recog-actions">
              <button className="qc-recog-retry" onClick={retryRecog}>
                <Icon name="rotate-ccw" size={15} /> 重新{recog.source === "photo" ? "拍照" : "录入"}
              </button>
              <button className="qc-recog-go" onClick={confirmRecog}>
                用这个去捕捉 <Icon name="arrow-right" size={15} />
              </button>
            </div>
          </div>
        </div>
      )}

      {/* 相机实时取景弹窗 */}
      {camOpen && (
        <div className="qc-cam-overlay" onClick={closeCamera}>
          <div className="qc-cam-modal glass" onClick={(e) => e.stopPropagation()}>
            <div className="qc-cam-stage">
              <video ref={videoRef} className="qc-cam-video" autoPlay playsInline muted></video>
              <div className="qc-cam-frame"></div>
            </div>
            <div className="qc-cam-actions">
              <button className="qc-cam-cancel" onClick={closeCamera}><Icon name="x" size={18} /> 取消</button>
              <button className="qc-cam-shot" onClick={snap} aria-label="拍照"><span></span></button>
              <span className="qc-cam-tip">对准问题，点圆钮拍照</span>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* Tiered floating preset questions (unchanged). */
function PresetChips({ batch, batchId, onPick, onShuffle, label = "试着问问看，或换一批" }) {
  const rowSizes = [2, 3, 3];
  const rows = [];
  let i = 0;
  for (const size of rowSizes) {
    if (i >= batch.length) break;
    rows.push(batch.slice(i, i + size));
    i += size;
  }
  let gi = 0;
  return (
    <div className="qc-float">
      <div className="qc-presets-label">
        <Icon name="sparkles" size={15} color="var(--fg-accent)" />
        <span className="label-mono">{label}</span>
      </div>
      <div className="qc-float-rows" key={batchId}>
        {rows.map((row, ri) => (
          <div className="qc-float-row" data-depth={ri} key={ri}>
            {row.map((q) => {
              const idx = gi++;
              return (
                <span className="qc-fwrap" key={q} style={{ animationDelay: idx * 70 + "ms" }}>
                  <span className="qc-fbob" style={{ animationDelay: (idx % 5) * 0.7 + "s" }}>
                    <button className="qc-chip qc-fchip" onClick={() => onPick(q)}>{q}</button>
                  </span>
                </span>
              );
            })}
          </div>
        ))}
      </div>
      <button className="qc-shuffle" onClick={onShuffle}>
        <Icon name="shuffle" size={15} />
        换一批好问题
      </button>
    </div>
  );
}

/* Infer a literature "type" badge from the source string. */
function sourceKind(s) {
  if (/人教|必修|选修|年级|教材|课本/.test(s)) return ["教材", "book-marked"];
  if (/拓展|校本|图解|动图|实验/.test(s)) return ["校本拓展", "flask-conical"];
  if (/报告|IPCC|论文|沃森|克里克|命题|原本|论语|礼记|史馆|名录/.test(s)) return ["文献", "scroll-text"];
  return ["资料", "file-text"];
}

function escHtml(s) {

function printSheet(question, data) {

    '<div class="qc-print-sheet">' +
      '<div class="qc-print-head"><span class="qc-print-brand">格致 · 问题捕手 · GEZHI</span>' +

      '<h1 class="qc-print-q">' + escHtml(question) + "</h1>" +
      (points ? '<div class="qc-print-sec"><div class="qc-print-sec-t">思维导图 · 线索</div><ul class="qc-print-map">' + points + "</ul></div>" : "") +
      (sources ? '<div class="qc-print-sec"><div class="qc-print-sec-t">相关文献</div><ul class="qc-print-list">' + sources + "</ul></div>" : "") +
      (data.detail ? '<div class="qc-print-sec"><div class="qc-print-sec-t">思路提示</div><p class="qc-print-p">' + escHtml(data.detail) + "</p></div>" : "") +
      (follow ? '<div class="qc-print-sec"><div class="qc-print-sec-t">引导追问 · 写下你的想法</div><ul class="qc-print-list qc-print-follow">' + follow + "</ul></div>" : "") +

      '<div class="qc-print-foot">好问题，是答案的一半。—— 把它说清楚，就是你的答案。</div>' +
    "</div>";
  document.body.appendChild(mount);
  window.print();
  window.setTimeout(() => mount.remove(), 600);
}

/* 为每条好问题注册「思考脚手架」式回答，进入完整探究时呈现导图+文献而非直接答案。 */
(function registerGoodAnswers() {
  if (!window.ANSWERS) return;
  const hints = ["先弄清它的定义与边界。", "找出它与问题的关键联系。", "据此推演可能的方案与取舍。"];
  GOOD_QUESTIONS.forEach((r) => {
    window.ANSWERS[r.question] = {
      tag: r.rank + " · " + r.grade + " · " + r.author,
      summary: "这是一个开放性的好问题——问题捕手不直接作答，而是为你铺好思考的脚手架：先理清概念，再查阅文献，试着自己回答。",
      points: r.keys.map((k, i) => [k, hints[i] || "围绕它继续追问。"]),
      detail: r.prompt,
      sources: r.ref.split(" · "),
      followups: [r.prompt],
    };
  });
})();

function FloatBubble({ rec, depth, active, onPick }) {
  return (
    <button className={"qc-fbub qc-depth-" + depth + (active ? " is-active" : "")} onClick={() => onPick(rec)}>
      <span className="qc-fbub-rank">{rec.rank}</span>
      <span className="qc-fbub-text">{rec.headline}</span>
    </button>
  );
}

function Lane({ recs, depth, top, dur, dir, onPick, activeId }) {
  const loop = recs.concat(recs);
  return (
    <div className="qc-lane" style={{ top: top + "%" }}>
      <div className="qc-lane-track" style={{ animationDuration: dur + "s", animationDirection: dir === "right" ? "reverse" : "normal" }}>
        {loop.map((r, i) => (
          <FloatBubble key={i} rec={r} depth={depth} active={r.id === activeId} onPick={onPick} />
        ))}
      </div>
    </div>
  );
}

function Standby({ onPick, onEnter }) {
  useLucide();

  /* 把 10 个真实好问题复制成两圈（共 20 个槽位），让顶端圆弧始终铺满、首尾相接、且不会同时出现重复。 */
  const items = useMemo(() => {
    const frac = (x) => { const v = Math.sin(x) * 43758.5453; return v - Math.floor(v); };
    const base = TOP10_2025.concat(TOP10_2025);
    return base.map((it, i) => ({
      ...it,
      idx: i,
      rand: 0.90 + frac((i + 1) * 12.9898) * 0.18,
      phase: frac((i + 1) * 78.233) * Math.PI * 2,
      freq: 0.5 + frac((i + 1) * 3.17) * 0.5,
      floatAmp: 4 + frac((i + 1) * 9.13) * 5,
    }));
  }, []);
  const N = items.length;
  const SPACING = 360 / N;
  const AUTO_DEG_PER_SEC = 2.2;       // 放慢的顺时针自转

  const stageRef = useRef(null);
  const cursorRef = useRef(null);
  const elRefs = useRef([]);
  const rotRef = useRef(0);
  const targetRef = useRef(0);
  const pausedRef = useRef(false);
  const resumeRef = useRef(null);
  const activeRef = useRef(0);
  const [activeIdx, setActiveIdx] = useState(0);

  function pauseAuto() {
    pausedRef.current = true;
    clearTimeout(resumeRef.current);
    resumeRef.current = setTimeout(() => { pausedRef.current = false; }, 14000);
  }
  function step(d) { targetRef.current += d * SPACING; pauseAuto(); }

  useControlLayer(true, {
    prev: () => step(-1),
    next: () => step(1),
    confirm: () => { const it = items[activeRef.current]; if (it) onPick(it.q); },
  });

  /* 自定义"取景准星"光标跟随鼠标 */
  useEffect(() => {
    function mv(e) {
      const c = cursorRef.current;
      if (c) { c.style.opacity = "1"; c.style.transform = "translate(" + e.clientX + "px," + e.clientY + "px)"; }
    }
    window.addEventListener("mousemove", mv);
    return () => window.removeEventListener("mousemove", mv);
  }, []);

  useEffect(() => {
    let raf, last = performance.now();
    function frame(now) {
      const dt = Math.min(0.05, (now - last) / 1000); last = now;
      if (!pausedRef.current) targetRef.current += AUTO_DEG_PER_SEC * dt;
      rotRef.current += (targetRef.current - rotRef.current) * Math.min(1, dt * 6);

      const stage = stageRef.current;
      if (!stage) { raf = requestAnimationFrame(frame); return; }
      const W = stage.clientWidth, H = stage.clientHeight;
      const R = Math.max(560, W * 0.62);
      const cx = W / 2;
      const cy = H * 0.32 + R;
      const t = now / 1000;

      let bestI = 0, bestAbs = 1e9;
      for (let i = 0; i < N; i++) {
        const el = elRefs.current[i];
        if (!el) continue;
        let aDeg = items[i].idx * SPACING + rotRef.current;
        aDeg = ((aDeg + 180) % 360 + 360) % 360 - 180;
        const aAbs = Math.abs(aDeg);
        if (aAbs < bestAbs) { bestAbs = aAbs; bestI = i; }
        if (aAbs > 64) {
          el.style.opacity = "0";
          el.style.pointerEvents = "none";
          el.style.transform = "translate(-9999px,-9999px)";
          continue;
        }
        const a = aDeg * Math.PI / 180;
        const x = cx + R * Math.sin(a);
        let y = cy - R * Math.cos(a);
        y += Math.sin(t * items[i].freq * 2 + items[i].phase) * items[i].floatAmp;
        const cosA = Math.cos(a);
        const isActive = i === activeRef.current;
        const scale = (0.62 + 0.42 * cosA) * items[i].rand * (isActive ? 1.12 : 1);
        const opacity = Math.max(0, Math.min(1, (64 - aAbs) / 20));
        el.style.opacity = String(isActive ? 1 : opacity * 0.82);
        el.style.pointerEvents = "auto";
        el.style.zIndex = String(Math.round(cosA * 100) + (isActive ? 300 : 0));
        /* 始终保持垂直：只做平移 + 缩放，不做旋转 */
        el.style.transform =
          "translate(" + x.toFixed(1) + "px," + y.toFixed(1) + "px) translate(-50%,-50%) scale(" + scale.toFixed(3) + ")";
      }
      if (bestI !== activeRef.current) { activeRef.current = bestI; setActiveIdx(bestI); }
      raf = requestAnimationFrame(frame);
    }
    raf = requestAnimationFrame(frame);
    return () => cancelAnimationFrame(raf);
  }, [N]);

  return (
    <div className="qc-standby qc-standby-ring">
      <div className="qc-ring-stage" ref={stageRef}>
        {items.map((it, i) => (
          <button
            key={i}
            ref={(el) => (elRefs.current[i] = el)}
            className={"qc-ring-q" + (i === activeIdx ? " is-active" : "")}
            onClick={() => onPick(it.q)}
            title={it.q}
          >
            <span className="qc-ring-frame" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
            <span className="qc-ring-text">{it.q}</span>
            <span className="qc-ring-meta">{it.asker} · {it.grade} · TOP {it.rank}</span>
          </button>
        ))}
      </div>
      <div className="qc-ring-veil"></div>

      <div className="qc-cursor" ref={cursorRef} aria-hidden="true">
        <svg viewBox="0 0 42 42" fill="none" stroke="#7DD8FB" stroke-width="2.4" stroke-linecap="round">
          <path d="M5 14 V5 H14" /><path d="M28 5 H37 V14" />
          <path d="M37 28 V37 H28" /><path d="M14 37 H5 V28" />
          <circle cx="21" cy="21" r="1.6" fill="#7DD8FB" stroke="none" />
        </svg>
      </div>

      <div className="qc-standby-foot">
        <span className="qc-eyebrow">
          <Icon name="scan-search" size={14} color="var(--fg-accent)" />
          <span className="label-mono">格致 · 问题捕手 · 2025 十大好问题</span>
        </span>
        <h1 className="qc-standby-title">你想<span className="qc-accent">捕捉</span>哪个问题？</h1>
        <p className="qc-standby-tagline">← → 选择 · ↓ 展开探究 · ↑ 取消，或轻触任意问题、自己提一个。</p>
        <button className="qc-enter-btn" onClick={onEnter}>
          <Icon name="pen-line" size={18} color="currentColor" />我要自己提问
        </button>
      </div>
    </div>
  );
}

/* ===== app ===== */
function App() {
  const [mode, setMode]     = useState("standby"); // "standby" | "app"
  const [draft, setDraft]   = useState("");
  const [query, setQuery]   = useState(null);
  const [focused, setFocused] = useState(false);
  const [busy, setBusy]     = useState(false);
  const [batch, setBatch]   = useState(() => sampleQuestions(8));
  const [batchId, setBatchId] = useState(0);

  useLucide();

  function shuffleBatch() {
    setBatch(sampleQuestions(8, batch));
    setBatchId((n) => n + 1);
  }

  function submit(q) {
    const question = (q ?? draft).trim();
    if (!question) return;
    setMode("app");
    setDraft(question);
    setBusy(true);
    setQuery(null);
    setTimeout(() => { setQuery(question); setBusy(false); }, 1100);
  }

  function pick(q) {
    if (q === "__reset__") { reset(); return; }
    submit(q);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function reset() {
    setQuery(null); setBusy(false); setDraft("");
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function enterApp() { setMode("app"); reset(); }
  function toStandby() { setMode("standby"); setQuery(null); setBusy(false); setDraft(""); }

  /* 摇杆 / 键盘 → 语义动作分发；并对外暴露 window.QC 供硬件回调（方式二）。 */
  useEffect(() => {
    function onKey(e) {
      const tag = (e.target && e.target.tagName) || "";
      const typing = tag === "INPUT" || tag === "TEXTAREA";
      let act = null;
      if (e.key === "ArrowLeft") act = "prev";
      else if (e.key === "ArrowRight") act = "next";
      else if (e.key === "ArrowDown" || e.key === "Enter") act = "confirm";
      else if (e.key === "ArrowUp" || e.key === "Escape") act = "cancel";
      if (!act) return;
      if (typing) {
        // 文本框内：方向键移动光标、回车交给输入框；仅接管 Esc=取消
        if (e.key === "Escape" && qcFire("cancel")) e.preventDefault();
        return;
      }
      if (qcFire(act)) e.preventDefault();
    }
    window.addEventListener("keydown", onKey);
    window.QC = {
      prev: () => qcFire("prev"),
      next: () => qcFire("next"),
      confirm: () => qcFire("confirm"),
      cancel: () => qcFire("cancel"),
    };
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  /* App 内的底层控制：下拨=提交当前问题（无答案时），上拨=返回待机屏。 */
  useControlLayer(mode === "app", {
    confirm: () => { if (!query && draft.trim()) submit(); },
    cancel: () => toStandby(),
  });

  /* Kiosk idle → return to the standby screensaver after inactivity. */
  const idle = useRef(null);
  useEffect(() => {
    if (mode !== "app") return;
    const rearm = () => {
      window.clearTimeout(idle.current);
      idle.current = window.setTimeout(toStandby, 90000);
    };
    const evs = ["pointerdown", "keydown", "mousemove", "wheel", "touchstart"];
    evs.forEach((e) => window.addEventListener(e, rearm));
    rearm();
    return () => { window.clearTimeout(idle.current); evs.forEach((e) => window.removeEventListener(e, rearm)); };
  }, [mode]);

  const hasAnswer = !!query;
  const answer = query ? getAnswer(query) : null;

  return (
    <div className="qc-app">
      <Background />

      {mode === "standby" ? (
        <Standby onPick={pick} onEnter={enterApp} />
      ) : (
        <React.Fragment>
          <Header onHome={toStandby} />
          <main className={"qc-stage" + (hasAnswer || busy ? " has-answer" : "")}>
            {!hasAnswer && (
              <div className="qc-hero">
                <span className="qc-eyebrow">
                  <Icon name="sparkles" size={14} color="var(--fg-accent)" />
                  <span className="label-mono">格物致知 · 从一个好问题开始</span>
                </span>
                <h1 className="qc-title">
                  你想<span className="qc-accent">捕捉</span>什么问题？
                </h1>
                <p className="qc-tagline">好问题，是答案的一半。问题捕手不替你作答，而是给你思考的脚手架。</p>
              </div>
            )}

            <AskWindow
              value={draft}
              onChange={setDraft}
              onSubmit={(q) => submit(q)}
              focused={focused}
              onFocus={() => setFocused(true)}
              onBlur={() => setFocused(false)}
              busy={busy}
            />

            {!hasAnswer && !busy && (
              <PresetChips batch={batch} batchId={batchId} onPick={pick} onShuffle={shuffleBatch} />
            )}

            {busy && (
              <div className="qc-loading glass">
                <div className="qc-bars"><span></span><span></span><span></span><span></span></div>
                <span className="qc-loading-text">问题捕手正在为你整理思考脚手架……</span>
              </div>
            )}

            {hasAnswer && (
              <StructuredAnswer question={query} data={answer} onPick={pick} />
            )}
          </main>
          <footer className="qc-foot">问题捕手 · 演示框架 v0.1 · 格致中学</footer>
        </React.Fragment>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
<script>
(function(){
  function boot(){
    if (!window.Babel || !window.React || !window.ReactDOM) { return setTimeout(boot, 30); }
    var src = document.getElementById('app-src').textContent;
    var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
    (0, eval)(out);
  }
  boot();
})();
</script>
</body>
</html>
